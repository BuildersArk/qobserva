[build-system]
requires = ["hatchling>=1.21.0"]
build-backend = "hatchling.build"

[project]
name = "qobserva"
version = "0.1.4"
description = "QObserva - Quantum program observability and benchmarking. One command to install and run everything."
readme = "README.md"
requires-python = ">=3.10"
license = { file = "LICENSE" }
authors = [{ name = "BuildersArk LLC", email = "support@qobserva.com" }]
maintainers = [{ name = "BuildersArk LLC", email = "support@qobserva.com" }]
keywords = [
  "quantum", "observability", "telemetry", "monitoring", "benchmarking",
  "qiskit", "braket", "cirq", "pennylane", "pyquil", "dwave"
]
classifiers = [
  "Development Status :: 4 - Beta",
  "Intended Audience :: Developers",
  "Intended Audience :: Science/Research",
  "License :: Other/Proprietary License",
  "Programming Language :: Python :: 3",
  "Programming Language :: Python :: 3.10",
  "Programming Language :: Python :: 3.11",
  "Programming Language :: Python :: 3.12",
  "Programming Language :: Python :: 3.13",
  "Topic :: Scientific/Engineering :: Physics",
  "Topic :: Software Development :: Libraries",
]
dependencies = [
  "typer>=0.12.0",
  "rich>=13.7.0",
  "qobserva-agent>=0.1.0",
  "qobserva-collector>=0.1.2",
  "qobserva-local>=0.1.1",
]

[project.optional-dependencies]
# SDK support - install all adapters
all-sdks = [
    "qiskit>=1.0.0",
    "amazon-braket-sdk>=1.70.0",
    "cirq>=1.0.0",
    "pennylane>=0.35.0",
    "pyquil>=4.0.0",
    "dimod>=0.12.0",
]
qiskit = ["qiskit>=1.0.0"]
braket = ["amazon-braket-sdk>=1.70.0"]
cirq = ["cirq>=1.0.0"]
pennylane = ["pennylane>=0.35.0"]
pyquil = ["pyquil>=4.0.0"]
dwave = ["dimod>=0.12.0"]
dev = [
    "pytest>=8.0.0",
    "ruff>=0.6.0",
]

[project.scripts]
qobserva = "qobserva.cli:app"

[project.urls]
Homepage = "https://qobserva.com"
Documentation = "https://qobserva.com/docs.html"
Repository = "https://github.com/BuildersArk/qobserva"
Issues = "https://github.com/BuildersArk/qobserva/issues"
Changelog = "https://github.com/BuildersArk/qobserva/blob/main/CHANGELOG.md"

[tool.hatch.build.targets.wheel]
packages = ["qobserva"]
