[build-system]
requires = ["hatchling>=1.21.0"]
build-backend = "hatchling.build"

[project]
name = "qobserva-collector"
version = "0.1.3"
description = "QObserva local collector service (FastAPI) for ingesting and storing run events."
readme = "README.md"
requires-python = ">=3.10"
license = { file = "LICENSE" }
authors = [{ name = "BuildersArk LLC", email = "support@qobserva.com" }]
maintainers = [{ name = "BuildersArk LLC", email = "support@qobserva.com" }]
keywords = [
  "quantum", "observability", "telemetry", "collector", "fastapi",
  "qiskit", "braket", "cirq", "pennylane", "pyquil", "dwave"
]
classifiers = [
  "Development Status :: 4 - Beta",
  "Intended Audience :: Developers",
  "Intended Audience :: Science/Research",
  "License :: Other/Proprietary License",
  "Programming Language :: Python :: 3",
  "Programming Language :: Python :: 3.10",
  "Programming Language :: Python :: 3.11",
  "Programming Language :: Python :: 3.12",
  "Programming Language :: Python :: 3.13",
  "Topic :: Scientific/Engineering :: Physics",
  "Topic :: Software Development :: Libraries",
]
dependencies = [
  # Avoid FastAPI 1.x source-install issues on some environments by staying <1.0.
  "fastapi>=0.110.0,<1.0.0",
  "uvicorn[standard]>=0.27.0",
  "sqlalchemy>=2.0.0",
  "pydantic>=2.6.0",
  "jsonschema>=4.21.0",
  "platformdirs>=4.2.0",
  "typer>=0.12.0",
  "python-multipart>=0.0.9",
]

[project.optional-dependencies]
dev = [
  "pytest>=8.0.0",
  "httpx>=0.26.0",
  "ruff>=0.6.0",
]

[project.scripts]
qobserva-collector = "qobserva_collector.cli:app"

[project.urls]
Homepage = "https://qobserva.com"
Documentation = "https://qobserva.com/docs.html"
Repository = "https://github.com/BuildersArk/qobserva"
Issues = "https://github.com/BuildersArk/qobserva/issues"
Changelog = "https://github.com/BuildersArk/qobserva/blob/main/CHANGELOG.md"

[tool.hatch.build.targets.wheel]
packages = ["qobserva_collector"]
