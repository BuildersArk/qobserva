[build-system]
requires = ["hatchling>=1.21.0"]
build-backend = "hatchling.build"

[project]
name = "qobserva-agent"
version = "0.1.1"
description = "QObserva agent: decorator-first telemetry for quantum runs (Qiskit, Braket, Cirq, PennyLane, pyQuil, D-Wave)."
readme = "README.md"
requires-python = ">=3.10"
license = { file = "LICENSE" }
authors = [{ name = "BuildersArk LLC", email = "support@qobserva.com" }]
maintainers = [{ name = "BuildersArk LLC", email = "support@qobserva.com" }]
keywords = [
  "quantum", "observability", "telemetry", "monitoring",
  "qiskit", "braket", "cirq", "pennylane", "pyquil", "dwave"
]
classifiers = [
  "Development Status :: 4 - Beta",
  "Intended Audience :: Developers",
  "Intended Audience :: Science/Research",
  "License :: Other/Proprietary License",
  "Programming Language :: Python :: 3",
  "Programming Language :: Python :: 3.10",
  "Programming Language :: Python :: 3.11",
  "Programming Language :: Python :: 3.12",
  "Programming Language :: Python :: 3.13",
  "Topic :: Scientific/Engineering :: Physics",
  "Topic :: Software Development :: Libraries",
]
dependencies = [
  "httpx>=0.26.0",
  "pydantic>=2.6.0",
  "jsonschema>=4.21.0",
  "platformdirs>=4.2.0",
  "typer>=0.12.0",
  "rich>=13.7.0",
]

[project.optional-dependencies]
# Updated for 2026 - using latest available stable versions
qiskit = ["qiskit>=1.2.0"]  # Qiskit 1.2+ (2025-2026) with improved primitives
braket = ["amazon-braket-sdk>=1.80.0"]  # Latest Braket SDK (2025-2026)
cirq = ["cirq>=1.3.0"]  # Latest Cirq (2025-2026)
pennylane = ["pennylane>=0.40.0"]  # Latest PennyLane (2025-2026)
pyquil = ["pyquil>=4.0.0"]  # pyQuil 4.x - Note: Requires Rust/Cargo to build
dwave = ["dimod>=0.12.20"]  # Latest dimod (0.12.21 as of 2025-2026)
dev = ["pytest>=8.0.0", "ruff>=0.6.0"]

[project.scripts]
qobserva = "qobserva.cli:app"

[project.entry-points."qobserva.adapters"]
qiskit = "qobserva.adapters.qiskit_adapter:QiskitAdapter"
braket = "qobserva.adapters.braket_adapter:BraketAdapter"
cirq = "qobserva.adapters.cirq_adapter:CirqAdapter"
pennylane = "qobserva.adapters.pennylane_adapter:PennyLaneAdapter"
pyquil = "qobserva.adapters.pyquil_adapter:PyQuilAdapter"
dwave = "qobserva.adapters.dwave_adapter:DWaveAdapter"

[project.urls]
Homepage = "https://qobserva.com"
Documentation = "https://qobserva.com/docs.html"
Repository = "https://github.com/BuildersArk/qobserva"
Issues = "https://github.com/BuildersArk/qobserva/issues"
Changelog = "https://github.com/BuildersArk/qobserva/blob/main/CHANGELOG.md"

[tool.hatch.build.targets.wheel]
packages = ["qobserva"]
