[build-system]
requires = ["hatchling>=1.21.0"]
build-backend = "hatchling.build"

[project]
name = "qobserva-local"
version = "0.1.1"
description = "One-command local stack runner (collector + UI) for QObserva."
readme = "README.md"
requires-python = ">=3.10"
license = { file = "LICENSE" }
authors = [{ name = "BuildersArk LLC", email = "support@qobserva.com" }]
maintainers = [{ name = "BuildersArk LLC", email = "support@qobserva.com" }]
keywords = [
  "quantum", "observability", "telemetry", "local", "dashboard",
  "qiskit", "braket", "cirq", "pennylane", "pyquil", "dwave"
]
classifiers = [
  "Development Status :: 4 - Beta",
  "Intended Audience :: Developers",
  "Intended Audience :: Science/Research",
  "License :: Other/Proprietary License",
  "Programming Language :: Python :: 3",
  "Programming Language :: Python :: 3.10",
  "Programming Language :: Python :: 3.11",
  "Programming Language :: Python :: 3.12",
  "Programming Language :: Python :: 3.13",
  "Topic :: Scientific/Engineering :: Physics",
  "Topic :: Software Development :: Libraries",
]
dependencies = [
  "typer>=0.12.0",
  "rich>=13.7.0",
  "httpx>=0.26.0",
  "platformdirs>=4.2.0",
]

[project.scripts]
qobserva-local = "qobserva_local.cli:app"

[project.urls]
Homepage = "https://qobserva.com"
Documentation = "https://qobserva.com/docs.html"
Repository = "https://github.com/BuildersArk/qobserva"
Issues = "https://github.com/BuildersArk/qobserva/issues"
Changelog = "https://github.com/BuildersArk/qobserva/blob/main/CHANGELOG.md"

[tool.hatch.build.targets.wheel]
packages = ["qobserva_local"]

[tool.hatch.build.targets.wheel.shared-data]
"qobserva_local/ui_dist" = "ui_dist"
